version: 2

multi-ecosystem-groups:
  maintenance:
    schedule:
      interval: monthly

updates:
  - package-ecosystem: npm
    directory: /
    target-branch: main
    multi-ecosystem-group: maintenance
    open-pull-requests-limit: 5
    cooldown:
      semver-patch-days: 7
      semver-minor-days: 14
      semver-major-days: 60
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

    groups:
      angular:
        patterns:
          - "@angular/*"
          - "@angular-builders/*"
          - "@angular-devkit/*"
          - "@angular-eslint/*"
          - "ng-packagr"
          - "typescript"
          - "rxjs"
          - "zone.js"

      linting:
        patterns:
          - "eslint"
          - "@typescript-eslint/*"
          - "prettier"
          - "lint-staged"

      testing:
        patterns:
          - "jest"
          - "jest-*"
          - "@types/jest"
          - "@types/jsdom"

      release:
        patterns:
          - "semantic-release"
          - "@semantic-release/*"
          - "commitizen"
          - "cz-conventional-changelog"
          - "@commitlint/*"

      build-tools:
        patterns:
          - "tsx"
          - "typedoc"
          - "license-checker"
          - "@types/license-checker"
          - "npm-run-all"
          - "rimraf"
          - "husky"
          - "prompt"

      runtime-misc:
        dependency-type: production
        patterns:
          - "material-icons"
          - "tslib"

  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    multi-ecosystem-group: maintenance
    open-pull-requests-limit: 5
    cooldown:
      default-days: 14
